name: Build tagged release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: tagged-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    name: Build EXE, MSI and portable packages
    runs-on: windows-latest

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_NOLOGO: '1'
      PROJECT_PATH: PortChecker/PortChecker.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Parse release tag
        id: release
        shell: pwsh
        run: |
          $tagName = '${{ github.ref_name }}'
          if ($tagName -notmatch '^v(?<number>[0-9]+(?:\.[0-9]+)*)(?<suffix>-[0-9A-Za-z][0-9A-Za-z.-]*)?$') {
            throw "Tag '$tagName' is invalid. Expected v + dot-separated numeric version, optionally followed by a prerelease suffix such as v0.0.7-alpha."
          }

          $versionParts = $Matches['number'].Split('.')
          while ($versionParts.Count -lt 3) {
            $versionParts += '0'
          }

          if ($versionParts.Count -gt 3) {
            $versionParts = $versionParts[0..2]
          }

          $productVersion = $versionParts -join '.'
          $suffix = $Matches['suffix']
          $displayVersion = "$productVersion$suffix"
          $isPrerelease = -not [string]::IsNullOrWhiteSpace($suffix)

          "tag_name=$tagName" >> $env:GITHUB_OUTPUT
          "product_version=$productVersion" >> $env:GITHUB_OUTPUT
          "display_version=$displayVersion" >> $env:GITHUB_OUTPUT
          "is_prerelease=$($isPrerelease.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "asset_prefix=PortChecker-$displayVersion-win-x64" >> $env:GITHUB_OUTPUT

          Write-Host "Tag: $tagName"
          Write-Host "Normalized product version: $productVersion"
          Write-Host "Display version: $displayVersion"
          Write-Host "Prerelease: $isPrerelease"

      - name: Restore
        run: dotnet restore $env:PROJECT_PATH

      - name: Build
        shell: pwsh
        run: |
          $assemblyVersion = '${{ steps.release.outputs.product_version }}.0'
          dotnet build $env:PROJECT_PATH `
            --configuration Release `
            --no-restore `
            -p:Version='${{ steps.release.outputs.display_version }}' `
            -p:AssemblyVersion=$assemblyVersion `
            -p:FileVersion=$assemblyVersion `
            -p:InformationalVersion='${{ steps.release.outputs.display_version }}'

      - name: Package
        shell: pwsh
        run: |
          .\.github\scripts\pack-release.ps1 `
            -ProjectPath $env:PROJECT_PATH `
            -Version '${{ steps.release.outputs.display_version }}' `
            -ProductVersion '${{ steps.release.outputs.product_version }}' `
            -Configuration Release `
            -Runtime win-x64 `
            -OutputRoot artifacts

      - name: Generate release notes
        if: steps.release.outputs.is_prerelease == 'false'
        id: notes
        shell: pwsh
        run: |
          $tagName = '${{ steps.release.outputs.tag_name }}'
          $displayVersion = '${{ steps.release.outputs.display_version }}'
          $repository = '${{ github.repository }}'
          $notesPath = Join-Path $env:RUNNER_TEMP 'release-notes.md'
          $assets = Get-ChildItem -LiteralPath artifacts/dist -File | Sort-Object Name

          if ($assets.Count -eq 0) {
            throw "No release assets were produced."
          }

          $previousTag = git tag --sort=-version:refname | Where-Object { $_ -ne $tagName } | Select-Object -First 1
          $commitRange = if ($previousTag) { "$previousTag..$tagName" } else { $tagName }
          $rawCommits = git log $commitRange --pretty=format:'%H%x09%h%x09%s'

          $preferredTypeOrder = @('feature', 'fix', 'optimize', 'ci')
          $groupedCommits = [ordered]@{}

          foreach ($rawCommit in $rawCommits) {
            if ([string]::IsNullOrWhiteSpace($rawCommit)) {
              continue
            }

            $parts = $rawCommit -split "`t", 3
            if ($parts.Count -lt 3) {
              continue
            }

            $fullSha = $parts[0]
            $shortSha = $parts[1]
            $subject = $parts[2]

            if ($subject -match '^\[(?<type>[^\]]+)\]\s*(?<message>.+)$') {
              $type = $Matches['type'].ToLowerInvariant()
              $message = $Matches['message']
            }
            else {
              $type = 'other'
              $message = $subject
            }

            if (-not $groupedCommits.Contains($type)) {
              $groupedCommits[$type] = [System.Collections.Generic.List[object]]::new()
            }

            $groupedCommits[$type].Add([pscustomobject]@{
              FullSha  = $fullSha
              ShortSha = $shortSha
              Message  = $message
            })
          }

          $sectionOrder = [System.Collections.Generic.List[string]]::new()
          foreach ($type in $preferredTypeOrder) {
            if ($groupedCommits.Contains($type)) {
              $sectionOrder.Add($type)
            }
          }

          foreach ($type in ($groupedCommits.Keys | Where-Object { $preferredTypeOrder -notcontains $_ } | Sort-Object)) {
            $sectionOrder.Add($type)
          }

          $downloadRows = foreach ($asset in $assets) {
            $assetName = $asset.Name
            $assetUrl = "https://github.com/$repository/releases/download/$tagName/$assetName"

            if ($assetName -like '*-portable.zip') {
              $kind = 'portable ZIP'
            }
            elseif ($asset.Extension -eq '.msi') {
              $kind = 'MSI installer'
            }
            elseif ($asset.Extension -eq '.exe') {
              $kind = 'EXE installer'
            }
            else {
              $kind = $asset.Extension.TrimStart('.').ToUpperInvariant()
            }

            "| Windows | $kind | $assetName | [下载]($assetUrl) |"
          }

          $noteLines = [System.Collections.Generic.List[string]]::new()
          $noteLines.Add("## What's Changed")
          $noteLines.Add("")

          if ($sectionOrder.Count -eq 0) {
            $noteLines.Add("- No user-facing changes were detected in this release.")
          }
          else {
            foreach ($type in $sectionOrder) {
              $noteLines.Add("[$type]:")
              $noteLines.Add("")
              foreach ($entry in $groupedCommits[$type]) {
                $commitUrl = "https://github.com/$repository/commit/$($entry.FullSha)"
                $noteLines.Add('- [`' + $entry.ShortSha + '`](' + $commitUrl + ') ' + $entry.Message)
              }
              $noteLines.Add("")
            }
          }

          if ($previousTag) {
            $compareUrl = "https://github.com/$repository/compare/$previousTag...$tagName"
            $noteLines.Add('Full Changelog: [`' + $previousTag + '...' + $tagName + '`](' + $compareUrl + ')')
          }
          else {
            $noteLines.Add("Full Changelog: Initial release")
          }

          $noteLines.Add("")
          $noteLines.Add("## 发行版")
          $noteLines.Add("")
          $noteLines.Add("| 平台 | 类型 | 文件 | 快速链接 |")
          $noteLines.Add("| --- | --- | --- | --- |")
          foreach ($row in $downloadRows) {
            $noteLines.Add($row)
          }

          [System.IO.File]::WriteAllLines($notesPath, $noteLines, [System.Text.UTF8Encoding]::new($false))
          "path=$notesPath" >> $env:GITHUB_OUTPUT

      - name: Upload test build artifact
        if: steps.release.outputs.is_prerelease == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.release.outputs.asset_prefix }}
          path: artifacts/dist/*
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release
        if: steps.release.outputs.is_prerelease == 'false'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tagName = '${{ steps.release.outputs.tag_name }}'
          $displayVersion = '${{ steps.release.outputs.display_version }}'
          $notesPath = '${{ steps.notes.outputs.path }}'
          $assets = Get-ChildItem -LiteralPath artifacts/dist -File | ForEach-Object { $_.FullName }

          if ($assets.Count -eq 0) {
            throw "No release assets were produced."
          }

          gh release view $tagName *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tagName --clobber $assets
            gh release edit $tagName --title "PortChecker v$displayVersion" --notes-file $notesPath
          }
          else {
            gh release create $tagName $assets --title "PortChecker v$displayVersion" --notes-file $notesPath --verify-tag
          }
